{% extends "base.html" %}
{% block body %}
<div class="flex-center" style="min-height:calc(100vh - 200px);padding:50px 20px;">
    <div style="width:440px;max-width:100%;">
        <div class="card" style="padding:40px;border-color:rgba(99,102,241,0.15);">
            <div class="text-center" style="margin-bottom:28px;">
                <div style="width:72px;height:72px;border-radius:20px;background:var(--gradient-main);display:inline-grid;place-items:center;font-size:32px;box-shadow:0 16px 50px rgba(99,102,241,0.35);transition:var(--transition);">
                    <i class="fas fa-lock"></i>
                </div>
                <h2 style="margin-top:20px;font-size:28px;">Welcome <span class="gradient-text">Back</span></h2>
                <p class="text-secondary" style="margin:4px 0 0;font-size:15px;">
                    Sign in to your <strong>MAHIM VPS</strong> dashboard
                </p>
            </div>

            {% if error %}
            <div style="background:rgba(239,68,68,0.08);color:#fca5a5;padding:14px 18px;border-radius:var(--radius-sm);margin-bottom:18px;font-size:13px;border-left:3px solid #ef4444;">
                <i class="fas fa-exclamation-triangle"></i> {{ error }}
            </div>
            {% endif %}

            <form method="post">
                <div style="position:relative;margin-bottom:14px;">
                    <i class="fas fa-user" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted);"></i>
                    <input name="username" placeholder="Username" autofocus required style="padding-left:44px;">
                </div>
                <div style="position:relative;margin-bottom:20px;">
                    <i class="fas fa-key" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted);"></i>
                    <input name="password" type="password" placeholder="Password" required style="padding-left:44px;">
                </div>

                <button class="btn btn-gradient btn-glow" style="width:100%;justify-content:center;padding:16px;font-size:16px;">
                    <i class="fas fa-arrow-right"></i> Sign In
                </button>

                <div class="flex-center mt-24" style="gap:20px;flex-wrap:wrap;font-size:12px;color:var(--text-muted);">
                    <span><i class="fas fa-user-cog"></i> Owner login</span>
                    <span><i class="fas fa-users"></i> User login</span>
                    <span><i class="fas fa-shield-alt" style="color:#34d399;"></i> Secure</span>
                </div>
            </form>
        </div>

        <div class="text-center mt-16">
            <p class="muted" style="font-size:12px;">
                <i class="fas fa-lock" style="color:#34d399;"></i> 
                Encrypted connection · Protected by MAHIM Security
            </p>
        </div>
    </div>
</div>
{% endblock %}
